<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; font-family: monospace; }
#label {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.4); font-size: 13px; letter-spacing: 3px;
  text-transform: uppercase; pointer-events: none; transition: opacity 0.5s;
}
</style>
</head>
<body>
<div id="label">SPHERE</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z = 6;

scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const light1 = new THREE.PointLight(0xff88ff, 2, 20);
scene.add(light1);
const light2 = new THREE.PointLight(0x88ffff, 2, 20);
scene.add(light2);
const light3 = new THREE.PointLight(0xffff88, 1.5, 20);
light3.position.set(0, 5, -3);
scene.add(light3);

const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));
const N = 1200;
const R = 2.8;

// --- Shape targets ---
function makeSphere(i) {
  const t = i / (N - 1);
  const phi = Math.acos(1 - 2 * t);
  const theta = GOLDEN_ANGLE * i;
  return new THREE.Vector3(
    R * Math.sin(phi) * Math.cos(theta),
    R * Math.sin(phi) * Math.sin(theta),
    R * Math.cos(phi)
  );
}

function makeTorus(i) {
  const t = i / N;
  const u = t * Math.PI * 2 * 18;
  const v = GOLDEN_ANGLE * i * 6;
  const r1 = 2.2, r2 = 0.9;
  return new THREE.Vector3(
    (r1 + r2 * Math.cos(v)) * Math.cos(u),
    (r1 + r2 * Math.cos(v)) * Math.sin(u),
    r2 * Math.sin(v)
  );
}

function makeCube(i) {
  const t = i / (N - 1);
  const phi = Math.acos(1 - 2 * t);
  const theta = GOLDEN_ANGLE * i;
  const v = new THREE.Vector3(
    Math.sin(phi) * Math.cos(theta),
    Math.sin(phi) * Math.sin(theta),
    Math.cos(phi)
  );
  // Project sphere point onto cube surface
  const ax = Math.abs(v.x), ay = Math.abs(v.y), az = Math.abs(v.z);
  const m = Math.max(ax, ay, az);
  return v.multiplyScalar(R / m);
}

function makeHelix(i) {
  const t = i / N;
  const angle = t * Math.PI * 20;
  const r = 1.8;
  return new THREE.Vector3(
    r * Math.cos(angle),
    (t - 0.5) * 6,
    r * Math.sin(angle)
  );
}

const SHAPES = [
  { fn: makeSphere, name: 'SPHERE' },
  { fn: makeTorus,  name: 'TORUS'  },
  { fn: makeCube,   name: 'CUBE'   },
  { fn: makeHelix,  name: 'HELIX'  },
];

// Precompute all targets
const targets = SHAPES.map(s => Array.from({ length: N }, (_, i) => s.fn(i)));

// Build meshes
const geo = new THREE.SphereGeometry(0.05, 10, 10);
const group = new THREE.Group();
const meshes = [];

for (let i = 0; i < N; i++) {
  const hue = (i * 0.618033) % 1;
  const mat = new THREE.MeshPhongMaterial({
    color: new THREE.Color().setHSL(hue, 1, 0.55),
    emissive: new THREE.Color().setHSL(hue, 1, 0.1),
    shininess: 120, specular: new THREE.Color(0xffffff),
  });
  const mesh = new THREE.Mesh(geo, mat);
  const p = targets[0][i];
  mesh.position.copy(p);
  mesh.userData = { hue, from: p.clone(), to: p.clone() };
  group.add(mesh);
  meshes.push(mesh);
}
scene.add(group);

// --- Wormhole tunnel ---
const tunnelGeo = new THREE.CylinderGeometry(1.2, 1.2, 60, 32, 40, true);
const tunnelMat = new THREE.MeshBasicMaterial({
  color: 0x220044, side: THREE.BackSide, wireframe: true, transparent: true, opacity: 0
});
const tunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
tunnel.rotation.x = Math.PI / 2;
scene.add(tunnel);

// --- State machine ---
let shapeIdx = 0;
let morphProgress = 1; // 1 = settled
let wormholeProgress = 0;
let isWormholing = false;
let t = 0;
const MORPH_SPEED = 0.012;
const SHAPE_HOLD = 5; // seconds before next morph
let holdTimer = 0;
const label = document.getElementById('label');

function startMorph() {
  const nextIdx = (shapeIdx + 1) % SHAPES.length;
  // Wormhole: next is helix or current, flash tunnel
  isWormholing = (nextIdx === 3 || shapeIdx === 3);
  shapeIdx = nextIdx;
  morphProgress = 0;
  wormholeProgress = 0;
  meshes.forEach((m, i) => {
    m.userData.from = m.position.clone();
    m.userData.to = targets[shapeIdx][i].clone();
  });
  label.textContent = SHAPES[shapeIdx].name;
}

// Easing
function easeInOut(x) {
  return x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2,3)/2;
}

const mouse = { x: 0, y: 0 };
const smoothMouse = { x: 0, y: 0 };
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth - 0.5) * 2;
  mouse.y = -(e.clientY / innerHeight - 0.5) * 2;
});

// Click to morph early
window.addEventListener('click', () => { holdTimer = SHAPE_HOLD; });

function animate() {
  requestAnimationFrame(animate);
  t += 0.005;

  smoothMouse.x += (mouse.x - smoothMouse.x) * 0.06;
  smoothMouse.y += (mouse.y - smoothMouse.y) * 0.06;

  // Hold & trigger morph
  if (morphProgress >= 1) {
    holdTimer += 0.005;
    if (holdTimer >= SHAPE_HOLD) { holdTimer = 0; startMorph(); }
  }

  // Morph positions
  if (morphProgress < 1) {
    morphProgress = Math.min(1, morphProgress + MORPH_SPEED);
    const e = easeInOut(morphProgress);
    meshes.forEach(m => {
      m.position.lerpVectors(m.userData.from, m.userData.to, e);
    });
  }

  // Wormhole effect
  if (isWormholing) {
    wormholeProgress = Math.min(1, wormholeProgress + 0.02);
    const wPeak = Math.sin(wormholeProgress * Math.PI); // bell curve 0→1→0
    tunnelMat.opacity = wPeak * 0.6;
    camera.position.z = 6 - wPeak * 4;
    camera.fov = 60 + wPeak * 40;
    camera.updateProjectionMatrix();
    tunnel.rotation.z += 0.05;
    if (wormholeProgress >= 1) { isWormholing = false; camera.position.z = 6; camera.fov = 60; camera.updateProjectionMatrix(); tunnelMat.opacity = 0; }
  }

  // Rotation + parallax
  group.rotation.y = t * 0.4 + smoothMouse.x * 0.8;
  group.rotation.x = smoothMouse.y * 0.5;
  camera.position.x += (smoothMouse.x * 1.2 - camera.position.x) * 0.04;
  camera.position.y += (smoothMouse.y * 0.8 - camera.position.y) * 0.04;
  camera.lookAt(scene.position);

  // Orbiting lights
  light1.position.set(4 * Math.cos(t), 3 * Math.sin(t * 0.7), 4 * Math.sin(t));
  light2.position.set(-4 * Math.sin(t * 0.8), -3, 3 * Math.cos(t * 0.6));

  // Color + pulse
  meshes.forEach((m, i) => {
    const hue = (m.userData.hue + t * 0.07) % 1;
    m.material.color.setHSL(hue, 1, 0.55);
    m.material.emissive.setHSL(hue, 1, 0.1);
    const pulse = 1 + 0.1 * Math.sin(t * 3 + i * 0.04);
    m.scale.setScalar(pulse);
  });

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
