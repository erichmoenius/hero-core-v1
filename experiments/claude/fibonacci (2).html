<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; font-family: monospace; }
#label {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.4); font-size: 13px; letter-spacing: 3px;
  text-transform: uppercase; pointer-events: none;
}
</style>
</head>
<body>
<div id="label">SPHERE</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z = 6;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const light1 = new THREE.PointLight(0xff88ff, 3, 20); scene.add(light1);
const light2 = new THREE.PointLight(0x88ffff, 3, 20); scene.add(light2);
const light3 = new THREE.PointLight(0xffff88, 2, 20);
light3.position.set(0, 5, -3); scene.add(light3);

const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));
const N = 1200;
const R = 2.8;

// Shape generators
function makeSphere(i) {
  const t = i / (N - 1);
  const phi = Math.acos(1 - 2 * t), theta = GOLDEN_ANGLE * i;
  return new THREE.Vector3(R * Math.sin(phi) * Math.cos(theta), R * Math.sin(phi) * Math.sin(theta), R * Math.cos(phi));
}
function makeTorus(i) {
  const t = i / N;
  const u = t * Math.PI * 2 * 18, v = GOLDEN_ANGLE * i * 6;
  const r1 = 2.2, r2 = 0.9;
  return new THREE.Vector3((r1 + r2 * Math.cos(v)) * Math.cos(u), (r1 + r2 * Math.cos(v)) * Math.sin(u), r2 * Math.sin(v));
}
function makeCube(i) {
  const t = i / (N - 1);
  const phi = Math.acos(1 - 2 * t), theta = GOLDEN_ANGLE * i;
  const v = new THREE.Vector3(Math.sin(phi) * Math.cos(theta), Math.sin(phi) * Math.sin(theta), Math.cos(phi));
  return v.multiplyScalar(R / Math.max(Math.abs(v.x), Math.abs(v.y), Math.abs(v.z)));
}
function makeHelix(i) {
  const t = i / N, angle = t * Math.PI * 20, r = 1.8;
  return new THREE.Vector3(r * Math.cos(angle), (t - 0.5) * 6, r * Math.sin(angle));
}

const SHAPES = [
  { fn: makeSphere, name: 'SPHERE' },
  { fn: makeTorus,  name: 'TORUS'  },
  { fn: makeCube,   name: 'CUBE'   },
  { fn: makeHelix,  name: 'HELIX'  },
];

// Precompute all shape targets
const targets = SHAPES.map(s => Array.from({ length: N }, (_, i) => s.fn(i)));

// --- GPU: InstancedMesh ---
const geo = new THREE.SphereGeometry(0.05, 10, 10);
const mat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.3, metalness: 0.4 });
const instanced = new THREE.InstancedMesh(geo, mat, N);
instanced.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
scene.add(instanced);

// Working arrays for morph
const fromPositions = targets[0].map(v => v.clone());
const toPositions   = targets[0].map(v => v.clone());
const matrix = new THREE.Matrix4();
const color  = new THREE.Color();
const tmpVec = new THREE.Vector3();

// Init positions + colors
for (let i = 0; i < N; i++) {
  matrix.setPosition(targets[0][i]);
  instanced.setMatrixAt(i, matrix);
  color.setHSL((i * 0.618033) % 1, 1, 0.55);
  instanced.setColorAt(i, color);
}
instanced.instanceMatrix.needsUpdate = true;
instanced.instanceColor.needsUpdate = true;

// Group wrapper for rotation
const group = new THREE.Group();
group.add(instanced);
scene.add(group);

// Wormhole tunnel
const tunnelGeo = new THREE.CylinderGeometry(1.2, 1.2, 60, 32, 40, true);
const tunnelMat = new THREE.MeshBasicMaterial({ color: 0x220044, side: THREE.BackSide, wireframe: true, transparent: true, opacity: 0 });
const tunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
tunnel.rotation.x = Math.PI / 2;
scene.add(tunnel);

// State
let shapeIdx = 0, morphProgress = 1, wormholeProgress = 0, isWormholing = false;
let t = 0, holdTimer = 0;
const MORPH_SPEED = 0.012, SHAPE_HOLD = 5;
const label = document.getElementById('label');

function easeInOut(x) { return x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2,3)/2; }

function startMorph() {
  const nextIdx = (shapeIdx + 1) % SHAPES.length;
  isWormholing = (nextIdx === 3 || shapeIdx === 3);
  shapeIdx = nextIdx;
  morphProgress = 0;
  wormholeProgress = 0;
  // Snapshot current positions as "from"
  for (let i = 0; i < N; i++) {
    instanced.getMatrixAt(i, matrix);
    fromPositions[i].setFromMatrixPosition(matrix);
    toPositions[i].copy(targets[shapeIdx][i]);
  }
  label.textContent = SHAPES[shapeIdx].name;
}

window.addEventListener('click', () => { holdTimer = SHAPE_HOLD; });

const mouse = { x: 0, y: 0 }, smoothMouse = { x: 0, y: 0 };
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth - 0.5) * 2;
  mouse.y = -(e.clientY / innerHeight - 0.5) * 2;
});

// Scroll to resize
let targetScale = 1.0, smoothScale = 1.0;
window.addEventListener('wheel', e => {
  targetScale = Math.max(0.2, Math.min(4.0, targetScale - e.deltaY * 0.001));
}, { passive: true });

function animate() {
  requestAnimationFrame(animate);
  t += 0.005;

  smoothMouse.x += (mouse.x - smoothMouse.x) * 0.06;
  smoothMouse.y += (mouse.y - smoothMouse.y) * 0.06;

  // Smooth scroll scale
  smoothScale += (targetScale - smoothScale) * 0.08;
  group.scale.setScalar(smoothScale);

  // Hold timer → trigger next morph
  if (morphProgress >= 1) {
    holdTimer += 0.005;
    if (holdTimer >= SHAPE_HOLD) { holdTimer = 0; startMorph(); }
  }

  // GPU morph: update instanced matrices
  if (morphProgress < 1) {
    morphProgress = Math.min(1, morphProgress + MORPH_SPEED);
    const e = easeInOut(morphProgress);
    for (let i = 0; i < N; i++) {
      tmpVec.lerpVectors(fromPositions[i], toPositions[i], e);
      matrix.setPosition(tmpVec);
      instanced.setMatrixAt(i, matrix);
    }
    instanced.instanceMatrix.needsUpdate = true;
  }

  // GPU color shift over time
  for (let i = 0; i < N; i++) {
    color.setHSL(((i * 0.618033) + t * 0.07) % 1, 1, 0.55);
    instanced.setColorAt(i, color);
  }
  instanced.instanceColor.needsUpdate = true;

  // Wormhole
  if (isWormholing) {
    wormholeProgress = Math.min(1, wormholeProgress + 0.02);
    const wPeak = Math.sin(wormholeProgress * Math.PI);
    tunnelMat.opacity = wPeak * 0.6;
    camera.position.z = 6 - wPeak * 4;
    camera.fov = 60 + wPeak * 40;
    camera.updateProjectionMatrix();
    tunnel.rotation.z += 0.05;
    if (wormholeProgress >= 1) {
      isWormholing = false;
      camera.position.z = 6; camera.fov = 60;
      camera.updateProjectionMatrix(); tunnelMat.opacity = 0;
    }
  }

  // Rotation + mouse parallax
  group.rotation.y = t * 0.4 + smoothMouse.x * 0.8;
  group.rotation.x = smoothMouse.y * 0.5;
  camera.position.x += (smoothMouse.x * 1.2 - camera.position.x) * 0.04;
  camera.position.y += (smoothMouse.y * 0.8 - camera.position.y) * 0.04;
  camera.lookAt(scene.position);

  // Orbiting lights
  light1.position.set(4 * Math.cos(t), 3 * Math.sin(t * 0.7), 4 * Math.sin(t));
  light2.position.set(-4 * Math.sin(t * 0.8), -3, 3 * Math.cos(t * 0.6));

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
