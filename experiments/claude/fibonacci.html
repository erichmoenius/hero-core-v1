<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>* { margin: 0; padding: 0; } body { background: #000; overflow: hidden; }</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z = 6;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const light1 = new THREE.PointLight(0xff88ff, 2, 20);
light1.position.set(4, 4, 4);
scene.add(light1);
const light2 = new THREE.PointLight(0x88ffff, 2, 20);
light2.position.set(-4, -3, 2);
scene.add(light2);
const light3 = new THREE.PointLight(0xffff88, 1.5, 20);
light3.position.set(0, 5, -3);
scene.add(light3);

const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));
const N = 1200;
const RADIUS = 2.8;

const geometry = new THREE.SphereGeometry(0.055, 12, 12);
const group = new THREE.Group();
const meshes = [];

for (let i = 0; i < N; i++) {
  const t = i / (N - 1);
  // Fibonacci sphere: uniform point distribution on sphere surface
  const phi   = Math.acos(1 - 2 * t);          // polar angle
  const theta = GOLDEN_ANGLE * i;               // azimuthal angle

  const x = RADIUS * Math.sin(phi) * Math.cos(theta);
  const y = RADIUS * Math.sin(phi) * Math.sin(theta);
  const z = RADIUS * Math.cos(phi);

  const hue = (i * 0.618033) % 1;
  const mat = new THREE.MeshPhongMaterial({
    color: new THREE.Color().setHSL(hue, 1, 0.55),
    emissive: new THREE.Color().setHSL(hue, 1, 0.1),
    shininess: 120,
    specular: new THREE.Color(0xffffff),
  });

  const mesh = new THREE.Mesh(geometry, mat);
  mesh.position.set(x, y, z);
  mesh.userData = { hue };
  group.add(mesh);
  meshes.push(mesh);
}

scene.add(group);

const mouse = { x: 0, y: 0 };
const smoothMouse = { x: 0, y: 0 };

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth - 0.5) * 2;
  mouse.y = -(e.clientY / innerHeight - 0.5) * 2;
});

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.005;

  smoothMouse.x += (mouse.x - smoothMouse.x) * 0.06;
  smoothMouse.y += (mouse.y - smoothMouse.y) * 0.06;

  // Slow auto-spin + mouse tilt
  group.rotation.y = t * 0.5 + smoothMouse.x * 0.8;
  group.rotation.x = smoothMouse.y * 0.5;

  // Camera parallax drift
  camera.position.x += (smoothMouse.x * 1.2 - camera.position.x) * 0.04;
  camera.position.y += (smoothMouse.y * 0.8 - camera.position.y) * 0.04;
  camera.lookAt(scene.position);

  // Animate lights orbiting
  light1.position.set(4 * Math.cos(t), 3 * Math.sin(t * 0.7), 4 * Math.sin(t));
  light2.position.set(-4 * Math.sin(t * 0.8), -3, 3 * Math.cos(t * 0.6));

  // Shift hues over time + subtle pulse
  meshes.forEach((m, i) => {
    const hue = (m.userData.hue + t * 0.08) % 1;
    m.material.color.setHSL(hue, 1, 0.55);
    m.material.emissive.setHSL(hue, 1, 0.1);
    const pulse = 1 + 0.12 * Math.sin(t * 3 + i * 0.04);
    m.scale.setScalar(pulse);
  });

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
